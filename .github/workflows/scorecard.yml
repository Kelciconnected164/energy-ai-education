name: OpenSSF Scorecard

on:
  schedule:
    - cron: "30 1 * * 1"  # Every Monday at 01:30 UTC
  push:
    branches: [main]

# Scorecard requires top-level read-all; write permissions are set per-job only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to GitHub Code Scanning
      id-token: write          # publish results to Scorecard API
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
